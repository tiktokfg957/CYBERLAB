<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Розыгрыши | CYBERLAB</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>CYBERLAB</h1>
                <span>STANDOFF 2</span>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="faceit.html">Faceit-система</a></li>
                    <li><a href="deathmatches.html">Deathmatches</a></li>
                    <li><a href="battlepass.html">Battlepass</a></li>
                    <li><a href="giveaways.html" class="active">Розыгрыши</a></li>
                    <li><a href="reviews.html">Отзывы</a></li>
                    <li><a href="profile.html">Профиль</a></li>
                    <li><a href="videos.html">Видео-уроки</a></li>
                </ul>
            </nav>
            <div class="burger">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <h1>Розыгрыши</h1>
            <div class="giveaway-tabs">
                <button id="tabCurrent" class="btn-primary active">Текущие</button>
                <button id="tabArchived" class="btn-secondary">Архив</button>
            </div>
            <div id="currentGiveaways" class="giveaway-list"></div>
            <div id="archivedGiveaways" class="giveaway-list" style="display:none;"></div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 CYBERLAB. Все права защищены. Standoff 2 – торговая марка AXLEBOLT.</p>
            <div class="socials">
                <a href="#"><i class="fab fa-vk"></i></a>
                <a href="#"><i class="fab fa-telegram"></i></a>
                <a href="#"><i class="fab fa-discord"></i></a>
            </div>
        </div>
    </footer>

    <style>
        .giveaway-tabs { margin-bottom: 32px; display: flex; gap: 16px; }
        .giveaway-list { display: grid; gap: 24px; }
        .giveaway-card { background: rgba(20,24,32,0.7); border-radius: 24px; padding: 24px; border-left: 4px solid #00f2fe; }
        .giveaway-card h3 { margin-bottom: 8px; }
        .giveaway-card .date { color: #aaa; margin-bottom: 12px; }
        .giveaway-card .prize { font-size: 1.2rem; font-weight: bold; color: #ffd966; margin-bottom: 12px; }
        .giveaway-card .condition { margin-bottom: 16px; }
        .btn-small { background: #00f2fe; border: none; padding: 8px 16px; border-radius: 40px; cursor: pointer; }
    </style>

    <script>
        const currentGiveaways = [
            { title: "Скины на 5000₽", date: "20 апреля 2025", prize: "5 наборов скинов", condition: "Подпишись на VK и сделай репост", link: "#" },
            { title: "Battlepass Premium", date: "25 апреля 2025", prize: "3 Premium Battlepass", condition: "Оставь отзыв на сайте", link: "#" }
        ];
        const archivedGiveaways = [
            { title: "Игровая мышь HyperX", date: "10 апреля 2025", winner: "Ghost_R1P", prize: "Мышь HyperX Pulsefire" },
            { title: "1000 монет", date: "5 апреля 2025", winner: "H1T_M4N", prize: "1000 внутриигровых монет" }
        ];

        function renderCurrent() {
            const container = document.getElementById("currentGiveaways");
            container.innerHTML = currentGiveaways.map(g => `
                <div class="giveaway-card">
                    <h3>${g.title}</h3>
                    <div class="date"><i class="far fa-calendar-alt"></i> ${g.date}</div>
                    <div class="prize">🎁 ${g.prize}</div>
                    <div class="condition">📋 Условие: ${g.condition}</div>
                    <button class="btn-small participate-btn" data-title="${g.title}">Участвовать</button>
                </div>
            `).join("");
            document.querySelectorAll('.participate-btn').forEach(btn => {
                btn.addEventListener('click', () => alert(`Вы участвуете в розыгрыше "${btn.dataset.title}"! Удачи!`));
            });
        }
        function renderArchived() {
            const container = document.getElementById("archivedGiveaways");
            container.innerHTML = archivedGiveaways.map(g => `
                <div class="giveaway-card">
                    <h3>${g.title}</h3>
                    <div class="date"><i class="far fa-calendar-alt"></i> ${g.date}</div>
                    <div class="prize">🏆 ${g.prize}</div>
                    <div>Победитель: <strong>${g.winner}</strong></div>
                </div>
            `).join("");
        }

        document.getElementById("tabCurrent")?.addEventListener("click", () => {
            document.getElementById("currentGiveaways").style.display = "grid";
            document.getElementById("archivedGiveaways").style.display = "none";
            document.getElementById("tabCurrent").classList.add("btn-primary");
            document.getElementById("tabCurrent").classList.remove("btn-secondary");
            document.getElementById("tabArchived").classList.add("btn-secondary");
            document.getElementById("tabArchived").classList.remove("btn-primary");
        });
        document.getElementById("tabArchived")?.addEventListener("click", () => {
            document.getElementById("currentGiveaways").style.display = "none";
            document.getElementById("archivedGiveaways").style.display = "grid";
            document.getElementById("tabArchived").classList.add("btn-primary");
            document.getElementById("tabArchived").classList.remove("btn-secondary");
            document.getElementById("tabCurrent").classList.add("btn-secondary");
            document.getElementById("tabCurrent").classList.remove("btn-primary");
        });
        renderCurrent();
        renderArchived();
    </script>
    <script src="js/main.js"></script>
</body>
</html>
